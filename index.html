<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Sharca | Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e272e 0%, #2c3e50 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .login-container {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px 30px;
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #2ecc71;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .role-toggle {
            display: flex;
            background: #f1f2f6;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 25px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: bold;
            color: #7f8c8d;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-btn.active {
            background: #ffffff;
            color: #2c3e50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2#auth-title {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-size: 15px;
            background: #fafafa;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3498db;
            background: #ffffff;
        }

        .hidden {
            display: none !important;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            transition: background 0.3s, transform 0.1s;
        }

        .submit-btn:hover {
            background: #27ae60;
        }
        
        .submit-btn:active {
            transform: scale(0.98);
        }

        .toggle-link {
            display: inline-block;
            margin-top: 20px;
            color: #3498db;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }

        .form-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #636e72;
        }

        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-wrap input {
            cursor: pointer;
        }

        .auth-message {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: left;
            display: none;
        }

        .auth-message.success {
            display: block;
            background: #e8f5e9;
            color: #1e7e34;
            border: 1px solid #c3e6cb;
        }

        .auth-message.error {
            display: block;
            background: #fdecea;
            color: #b42318;
            border: 1px solid #f5c2c0;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">Sharca</div>
        <div class="subtitle">Your journey, shared.</div>

        <div class="role-toggle">
            <button type="button" id="btn-user" class="role-btn active" onclick="setRole('user')">User</button>
            <button type="button" id="btn-driver" class="role-btn" onclick="setRole('driver')">Driver</button>
        </div>

        <h2 id="auth-title">Login</h2>

        <form onsubmit="handleAuth(event)">
            <div class="input-group hidden" id="name-field">
                <input type="text" id="auth-name" placeholder="Full Name">
            </div>

            <div class="input-group">
                <input type="email" id="auth-email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <input type="password" id="auth-password" placeholder="Password" required>
            </div>

            <div class="form-meta">
                <label class="remember-wrap" for="remember-session">
                    <input type="checkbox" id="remember-session" checked>
                    Keep me logged in
                </label>
            </div>

            <button type="submit" id="auth-submit-btn" class="submit-btn">Login</button>
        </form>

        <div id="auth-message" class="auth-message"></div>

        <span class="toggle-link" onclick="toggleSignup()">Don't have an account? Sign Up</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=3"></script>
    <script src="app.js?v=3"></script>

</body>
</html>
