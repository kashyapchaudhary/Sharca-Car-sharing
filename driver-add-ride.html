<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharca - Offer a Ride</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            color: #333;
        }
        
        header {
            background: linear-gradient(135deg, #1e272e 0%, #2f3640 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 { margin: 0; }
        
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 14px;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .content-card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Form Grid Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
            font-size: 14px;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fdfdfd;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            background-color: #fff;
        }

        .btn-publish {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            transition: background 0.3s;
        }

        .btn-publish:hover {
            background: #27ae60;
        }

        /* Published Rides List Styles */
        .ride-card {
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            background: #fafafa;
            flex-wrap: wrap;
            gap: 15px;
        }

        .badge {
            background: #e1f5fe;
            color: #0288d1;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h2>Sharca Driver</h2>
        <div class="nav-links">
            <a href="driver-dashboard.html">Dashboard</a>
            <a href="driver-add-ride.html" style="font-weight: bold; border-bottom: 2px solid #2ecc71;">Add Ride</a>
            <a href="#">Earnings</a>
            <a href="driver-profile.html">Profile</a>
            <a href="index.html" onclick="logoutUser(event)">Logout</a>
        </div>
    </header>

    <div class="container">
        
        <div class="content-card">
            <h2 style="margin-top: 0; color: #2c3e50;">Offer a New Ride</h2>
            <p style="color: #7f8c8d; margin-bottom: 20px;">Plan your journey and share your empty seats with passengers.</p>
            
            <form id="offer-ride-form" onsubmit="publishRide(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="ride-origin">Origin</label>
                        <input type="text" id="ride-origin" placeholder="e.g., Ahmedabad" required>
                    </div>
                    <div class="form-group">
                        <label for="ride-dest">Destination</label>
                        <input type="text" id="ride-dest" placeholder="e.g., Surat" required>
                    </div>
                    <div class="form-group">
                        <label for="ride-date">Date</label>
                        <input type="date" id="ride-date" required>
                    </div>
                    <div class="form-group">
                        <label for="ride-time">Time of Departure</label>
                        <input type="time" id="ride-time" required>
                    </div>
                    <div class="form-group">
                        <label for="ride-seats">Available Seats</label>
                        <input type="number" id="ride-seats" min="1" max="6" placeholder="e.g., 3" required>
                    </div>
                    <div class="form-group">
                        <label for="ride-price">Price per Seat (₹)</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="ride-price" min="50" placeholder="e.g., 450" required style="flex: 1;">
                            <button type="button" id="calc-price-btn" onclick="calculateAutoPrice()" style="padding: 10px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Calculate ₹3/km</button>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-publish">Publish Route</button>
            </form>
        </div>

        <div class="content-card">
            <h3 style="margin-top: 0; color: #2c3e50;">My Active Routes</h3>
            <div id="published-rides-container">
                </div>
        </div>

    </div>

    <div id="hidden-map" style="display: none; height: 10px;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', loadPublishedRides);

        // --- NEW: AUTO-CALCULATE PRICE EXACTLY LIKE THE USER APP ---
        async function calculateAutoPrice() {
            const origin = document.getElementById('ride-origin').value;
            const dest = document.getElementById('ride-dest').value;
            const priceBtn = document.getElementById('calc-price-btn');
            const priceInput = document.getElementById('ride-price');

            if (!origin || !dest) {
                alert("Please enter both Origin and Destination first.");
                return;
            }

            priceBtn.innerText = "Calculating...";

            try {
                // Fetch coordinates for Origin and Destination
                const originRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(origin)}`);
                const originData = await originRes.json();
                
                const destRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dest)}`);
                const destData = await destRes.json();

                if (originData.length === 0 || destData.length === 0) {
                    alert("Could not find these locations to calculate distance.");
                    priceBtn.innerText = "Calculate ₹3/km";
                    return;
                }

                const startLatLng = L.latLng(originData[0].lat, originData[0].lon);
                const endLatLng = L.latLng(destData[0].lat, destData[0].lon);

                // Use Leaflet Routing to calculate the real road distance in the background
                if (!window.dummyMap) {
                    window.dummyMap = L.map('hidden-map').setView([22.2587, 71.1924], 7);
                }

                const tempRouting = L.Routing.control({
                    waypoints: [startLatLng, endLatLng],
                    createMarker: function() { return null; }, // Hidden markers
                    show: false,
                    addWaypoints: false,
                    routeWhileDragging: false
                }).addTo(window.dummyMap);

                // When Leaflet finds the route, calculate the math
                tempRouting.on('routesfound', function(e) {
                    const distanceKm = (e.routes[0].summary.totalDistance / 1000).toFixed(1);
                    
                    // SAME MATH AS APP.JS
                    const baseFare = 50; 
                    const perKmRate = 3; 
                    const estimatedPrice = Math.round(baseFare + (distanceKm * perKmRate));

                    priceInput.value = estimatedPrice;
                    priceBtn.innerText = `Done (${distanceKm} km)`;
                    
                    window.dummyMap.removeControl(tempRouting);
                });

                tempRouting.on('routingerror', function() {
                    alert("Could not calculate driving route.");
                    priceBtn.innerText = "Calculate ₹3/km";
                    window.dummyMap.removeControl(tempRouting);
                });

            } catch (error) {
                alert("Error calculating price. Please enter manually.");
                priceBtn.innerText = "Calculate ₹3/km";
            }
        }

        async function publishRide(event) {
            event.preventDefault(); 

            const newRide = {
                origin: document.getElementById('ride-origin').value,
                destination: document.getElementById('ride-dest').value,
                date: document.getElementById('ride-date').value,
                time: document.getElementById('ride-time').value,
                seatsLeft: parseInt(document.getElementById('ride-seats').value),
                price: parseInt(document.getElementById('ride-price').value),
                status: 'active'
            };

            try {
                await createRideOfferRecord(newRide);
                document.getElementById('offer-ride-form').reset();
                document.getElementById('calc-price-btn').innerText = "Calculate ₹3/km";
                await loadPublishedRides();
                alert("Ride published successfully! Riders can now see it in search.");
            } catch (error) {
                alert(error.message || "Unable to publish ride.");
            }
        }

        async function loadPublishedRides() {
            const container = document.getElementById('published-rides-container');
            const session = getStoredSession();
            const offeredRides = isSupabaseConfigured() && session
                ? await fetchRideOffers({ driverId: session.id })
                : [];

            container.innerHTML = ''; 

            if (offeredRides.length === 0) {
                container.innerHTML = '<p style="color: #7f8c8d; text-align: center;">You have no active routes published.</p>';
                return;
            }

            offeredRides.forEach((ride) => {
                const card = document.createElement('div');
                card.className = 'ride-card';

                card.innerHTML = `
                    <div style="flex: 1; min-width: 200px;">
                        <h4 style="margin: 0 0 5px 0; color: #2c3e50; font-size: 18px; text-transform: capitalize;">
                            ${ride.origin} ➔ ${ride.destination}
                        </h4>
                        <p style="margin: 0; color: #7f8c8d; font-size: 14px;">📅 ${ride.ride_date} | 🕒 ${ride.ride_time}</p>
                    </div>
                    
                    <div style="text-align: center;">
                        <span class="badge">💺 ${ride.seats_left} Seats</span>
                        <h3 style="margin: 5px 0 0 0; color: #2e7d32;">₹${ride.price}</h3>
                    </div>

                    <div>
                        <button onclick="deleteRide(${ride.id})" style="padding: 8px 15px; background: white; color: #e74c3c; border: 1px solid #e74c3c; border-radius: 6px; cursor: pointer; font-weight: bold;">Remove</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function deleteRide(rideId) {
            if (confirm("Are you sure you want to delete this route?")) {
                try {
                    await deleteRideOfferRecord(rideId);
                    await loadPublishedRides();
                } catch (error) {
                    alert(error.message || "Unable to remove ride.");
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
