<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharca - Home Search</title>
    <link rel="stylesheet" href="style.css?v=2">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        .payment-banner {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
            animation: slideDown 0.5s ease;
            position: relative;
            z-index: 99;
        }
        .payment-banner-info h3 { margin: 0; font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .payment-banner-info p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }
        .btn-banner-pay {
            background: white;
            color: #e67e22;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-banner-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <header>
        <h2>Sharca</h2>
        <div class="nav-links">
            <a href="home.html">Search</a>
            <a href="trips.html">My Trips</a>
            <a href="user-history.html">History</a>
            <a href="profile.html">Profile</a>
            <a href="help.html">Help</a>
            <a href="index.html" onclick="logoutUser(event)">Logout</a>
        </div>
    </header>

    <div id="payment-banner-container" style="display: none;"></div>

    
    <div class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Where to next?</h1>
            <p>Find the perfect ride, share the journey, and save money.</p>
            
            <div class="glass-panel">
                <div class="glass-input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                    <input type="text" id="origin" placeholder="Leaving from (e.g., Ahmedabad)" required>
                </div>
                <div class="glass-input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <input type="text" id="destination" placeholder="Going to (e.g., Surat)" required>
                </div>
                <button class="btn-glow" id="search-btn" onclick="calculateRoute()">Search Rides</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="modern-map-container">
            <div id="map" class="modern-map"></div>
        </div>
        
        <div id="available-rides-container" class="rides-grid"></div>
        
        <div id="booking-confirmation" class="hidden modern-toast"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=3"></script>
    <script src="app.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if(typeof setupAutocomplete === 'function') {
                setupAutocomplete('origin');
                setupAutocomplete('destination');
            }
            
            // Check for pending payments
            try {
                if (typeof isSupabaseConfigured === 'function' && isSupabaseConfigured()) {
                    const trips = await fetchRiderTrips();
                    const unpaidTrip = trips.find(t => t.status === 'completed');
                    
                    if (unpaidTrip) {
                        const bannerContainer = document.getElementById('payment-banner-container');
                        bannerContainer.innerHTML = `
                            <div class="payment-banner">
                                <div class="payment-banner-info">
                                    <h3>⚠️ Payment Required</h3>
                                    <p>Your ride from ${unpaidTrip.origin} to ${unpaidTrip.destination} is complete. Please pay the driver.</p>
                                </div>
                                <button class="btn-banner-pay" onclick="window.location.href='user-payment.html?bookingId=${unpaidTrip.id}'">Pay ₹${unpaidTrip.price || 0}</button>
                            </div>
                        `;
                        bannerContainer.style.display = 'block';
                    }
                }
            } catch (err) {
                console.error("Failed to fetch trips for payment check:", err);
            }
        });
    </script>
</body>
</html>
