<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Earnings & Wallet | Sharca</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            color: #333;
        }

        /* Standard Driver Header */
        header {
            background: linear-gradient(135deg, #1e272e 0%, #2f3640 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h2 { margin: 0; }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 14px;
        }

        /* Dashboard Styles */
        .dashboard-container {
            max-width: 600px;
            margin: 30px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Wallet Box */
        .wallet-box {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .wallet-box h2 {
            margin: 0;
            font-size: 48px;
        }
        .wallet-box span {
            font-size: 16px;
            opacity: 0.9;
        }

        /* History Section */
        .history-section {
            padding: 20px;
        }
        .history-section h3 {
            margin-top: 0;
            font-size: 18px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            color: #2c3e50;
        }
        
        .ride-history-card {
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .ride-history-card:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .ride-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .ride-route {
            font-weight: bold;
            font-size: 16px;
            color: #34495e;
        }
        .ride-earn {
            font-weight: bold;
            color: #27ae60;
            font-size: 18px;
        }
        
        .ride-details {
            font-size: 13px;
            color: #7f8c8d;
            display: flex;
            justify-content: space-between;
            border-top: 1px dashed #ddd;
            padding-top: 8px;
        }

        .btn-cashout {
            display: block;
            width: calc(100% - 40px);
            margin: 20px;
            padding: 15px;
            background-color: #000;
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .btn-cashout:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

    <header>
        <h2>Sharca Driver</h2>
        <div class="nav-links">
            <a href="driver-dashboard.html">Dashboard</a>
            <a href="driver-add-ride.html">Offer Ride</a>
            <a href="driver-earnings.html" style="font-weight: bold; border-bottom: 2px solid #2ecc71;">Earnings</a>
            <a href="driver-profile.html">Profile</a>
            <a href="index.html" onclick="logoutUser(event)">Logout</a>
        </div>
    </header>

    <div class="dashboard-container">
        
        <div class="wallet-box">
            <span>Available Balance</span>
            <h2 id="total-wallet">₹0.00</h2>
        </div>

        <div class="history-section">
            <h3>Completed Rides History</h3>
            
            <div id="ride-history-list">
                </div>
        </div>

        <button class="btn-cashout" onclick="cashOut()">Transfer to Bank Account</button>
    </div>

    <script>
        // 1. Fetch or Simulate Completed Rides
        async function getCompletedRides() {
            const completed = isSupabaseConfigured()
                ? await fetchDriverCompletedTrips()
                : [];
            return completed;
        }

        // 2. Calculate Earnings and Render the Page
        async function loadWalletAndHistory() {
            const rides = await getCompletedRides();
            const historyContainer = document.getElementById('ride-history-list');
            let totalWalletBalance = 0;

            historyContainer.innerHTML = ''; // Clear loading state

            rides.forEach(ride => {
                const platformFeePercent = 0.20;
                const pricePaidByUser = Number(ride.price || 0);
                const platformFeeAmount = pricePaidByUser * platformFeePercent;
                const driverNetEarning = pricePaidByUser - platformFeeAmount;

                // Add to total balance
                totalWalletBalance += driverNetEarning;

                // Create the history card for this ride
                const card = document.createElement('div');
                card.className = 'ride-history-card';
                card.innerHTML = `
                    <div class="ride-header">
                        <span class="ride-route">${ride.origin} ➔ ${ride.destination}</span>
                        <span class="ride-earn">+ ₹${driverNetEarning.toFixed(2)}</span>
                    </div>
                    <div class="ride-details">
                        <span>📅 ${ride.completed_at ? new Date(ride.completed_at).toLocaleString('en-IN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'Recently completed'}</span>
                        <span>
                            User Paid: ₹${pricePaidByUser.toFixed(2)} 
                            <br>
                            <small style="color: #e74c3c;">(Sharca Fee: -₹${platformFeeAmount.toFixed(2)})</small>
                        </span>
                    </div>
                `;
                historyContainer.appendChild(card);
            });

            // Update the big wallet number at the top
            document.getElementById('total-wallet').innerText = '₹' + totalWalletBalance.toFixed(2);
        }

        // 3. Fake Cash Out Function
        function cashOut() {
            const balanceText = document.getElementById('total-wallet').innerText;
            if (balanceText === '₹0.00') {
                alert("You have no funds to withdraw.");
                return;
            }
            
            alert(`Processing bank transfer of ${balanceText}... \n\nThis demo keeps completed rides in your history.`);
        }

        // Run this as soon as the page loads
        document.addEventListener('DOMContentLoaded', loadWalletAndHistory);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
