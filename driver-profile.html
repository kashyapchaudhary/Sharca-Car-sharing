<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharca - Driver Profile</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            color: #333;
        }
        
        header {
            background: linear-gradient(135deg, #1e272e 0%, #2f3640 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 { margin: 0; }
        
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 14px;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .content-card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Profile Header Section */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #3498db;
            color: white;
            font-size: 36px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .profile-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-item {
            text-align: center;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
        }
        
        .stat-item span {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .stat-item p {
            margin: 0;
            font-size: 12px;
            color: #7f8c8d;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fdfdfd;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            background-color: #fff;
        }

        .section-title {
            color: #2c3e50;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            transition: background 0.3s;
        }

        .btn-save:hover {
            background: #27ae60;
        }

        .hidden {
            display: none !important;
        }

        .success-banner {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #c3e6cb;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h2>Sharca Driver</h2>
        <div class="nav-links">
            <a href="driver-dashboard.html">Dashboard</a>
            <a href="#">Earnings</a>
            <a href="driver-profile.html">Profile</a>
            <a href="help.html">Help</a>
            <a href="index.html" onclick="logoutUser(event)">Logout</a>
        </div>
    </header>

    <div class="container">
        <div id="profile-success" class="success-banner hidden">
            ✅ Profile and Vehicle Details Updated Successfully!
        </div>

        <div class="content-card">
            <div class="profile-header">
                <div class="avatar" id="avatar-initial">R</div>
                <div>
                    <h2 style="margin: 0; color: #2c3e50;" id="display-name">Rishi Kapoor</h2>
                    <p style="margin: 5px 0 0 0; color: #7f8c8d;">Joined February 2026</p>
                    
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span>4.8 ⭐</span>
                            <p>Rating</p>
                        </div>
                        <div class="stat-item">
                            <span>142</span>
                            <p>Total Rides</p>
                        </div>
                    </div>
                </div>
            </div>

            <form onsubmit="saveProfile(event)">
                
                <h3 class="section-title">Personal Information</h3>
                
                <div class="form-group">
                    <label for="profile-name">Full Name</label>
                    <input type="text" id="profile-name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="profile-email">Email Address</label>
                    <input type="email" id="profile-email" placeholder="driver@example.com" required>
                </div>

                <div class="form-group">
                    <label for="profile-phone">Phone Number</label>
                    <input type="tel" id="profile-phone" placeholder="+91 98765 43210" required>
                </div>

                <h3 class="section-title">Vehicle Details</h3>

                <div class="form-group">
                    <label for="profile-car">Car Make, Model & Color</label>
                    <input type="text" id="profile-car" placeholder="e.g., White Suzuki Dzire" required>
                </div>

                <div class="form-group">
                    <label for="profile-plate">License Plate Number</label>
                    <input type="text" id="profile-plate" placeholder="e.g., GJ-03-XX-1234" required>
                </div>

                <button type="submit" class="btn-save">Save Profile Details</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
