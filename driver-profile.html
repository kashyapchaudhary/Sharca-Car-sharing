<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharca - Driver Profile</title>
    <link rel="stylesheet" href="style.css?v=4">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0;
            color: #2c3e50;
            min-height: 100vh;
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h2 { margin: 0; font-weight: 800; color: #2ecc71; }

        .nav-links a {
            color: #34495e;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .nav-links a:hover { color: #2ecc71; }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,1);
        }

        .sidebar {
            flex: 1;
            min-width: 280px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-content {
            flex: 2;
            min-width: 300px;
        }

        /* Avatar Upload */
        .avatar-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(135deg, #00b09b, #96c93d);
            overflow: hidden;
        }

        .avatar-container:hover {
            transform: scale(1.05);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .avatar-container:hover .avatar-overlay {
            opacity: 1;
        }

        .avatar-overlay svg {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 2;
        }

        #avatar-upload {
            display: none;
        }

        .profile-name {
            font-size: 26px;
            font-weight: 800;
            margin: 10px 0 5px;
        }

        .profile-status {
            color: #27ae60;
            font-size: 14px;
            font-weight: 600;
            background: rgba(46, 204, 113, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        /* Stats */
        .stats-grid {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-bottom: 25px;
        }
        
        .stat-box {
            flex: 1;
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px 15px;
            border: 1px solid #ecf0f1;
            transition: transform 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 5px;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        /* Form */
        .section-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
            color: #2c3e50;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 4px;
            background: #2ecc71;
            bottom: -10px;
            left: 0;
            border-radius: 2px;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }
        .form-row .form-group {
            flex: 1;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }

        .input-glass {
            width: 100%;
            padding: 16px;
            border: 2px solid #ecf0f1;
            border-radius: 14px;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            background: #f8f9fa;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-glass:focus {
            outline: none;
            border-color: #2ecc71;
            background: white;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
        }
        
        .input-glass:disabled {
            background: #e9ecef;
            cursor: not-allowed;
            color: #7f8c8d;
        }

        .btn-save {
            width: 100%;
            padding: 18px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(46, 204, 113, 0.4);
            background: #27ae60;
        }

        .btn-logout {
            background: transparent;
            color: #e74c3c;
            border: 2px solid #fadbd8;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: auto;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-logout:hover {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <header>
        <h2>Sharca Driver</h2>
        <div class="nav-links">
            <a href="driver-dashboard.html">Dashboard</a>
            <a href="driver-add-ride.html">Add Ride</a>
            <a href="driver-earn.html">Earnings</a>
            <a href="driver-profile.html" style="color:#2ecc71;">Profile</a>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar: Photo & Stats -->
        <div class="card sidebar">
            <div class="avatar-container" onclick="document.getElementById('avatar-upload').click()">
                <div id="avatar-initials" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: 800; color: white;"></div>
                <img id="avatar-img" class="avatar-img" style="display:none;" />
                
                <div class="avatar-overlay">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </div>
            </div>
            <input type="file" id="avatar-upload" accept="image/*" onchange="handleAvatarUpload(event)">
            
            <div class="profile-name" id="display-name">Loading...</div>
            <div class="profile-status">Verified Driver ✅</div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-number" id="stat-rating">4.9</span>
                    <span class="stat-label">Rating ⭐</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number" id="stat-rides">12</span>
                    <span class="stat-label">Total Rides</span>
                </div>
            </div>

            <button class="btn-logout" onclick="handleLogout()">Log Out</button>
        </div>

        <!-- Main Content: Edit Details -->
        <div class="card main-content">
            <h3 class="section-title">Personal Details</h3>
            
            <form id="profile-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="profile-name" class="input-glass" placeholder="e.g. John Doe" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="profile-phone" class="input-glass" placeholder="e.g. +91 9876543210">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="profile-email" class="input-glass" disabled>
                    </div>
                </div>

                <h3 class="section-title" style="margin-top: 15px;">Vehicle Details</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label>Car Model</label>
                        <input type="text" id="profile-car" class="input-glass" placeholder="e.g. Honda City">
                    </div>
                    <div class="form-group">
                        <label>License Plate</label>
                        <input type="text" id="profile-plate" class="input-glass" placeholder="e.g. MH 01 AB 1234">
                    </div>
                </div>

                <button type="button" class="btn-save" id="save-btn" onclick="saveDriverProfile()">
                    Save Changes
                </button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">Profile Updated Successfully!</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=4"></script>
    <script src="app.js?v=4"></script>
    <script>
        window.onload = async function() {
            try {
                await requireUserSession();
                loadProfileData();
            } catch (err) {
                console.error(err);
            }
        };

        function loadProfileData() {
            const profile = getCachedProfile();
            const session = getStoredSession();

            const name = profile.name || session.name || '';
            
            document.getElementById('profile-name').value = name;
            document.getElementById('profile-email').value = session.email || '';
            document.getElementById('profile-phone').value = profile.phone || '';
            document.getElementById('profile-car').value = profile.car || '';
            document.getElementById('profile-plate').value = profile.plate || '';
            
            document.getElementById('display-name').innerText = name;

            // Handle Avatar
            const avatarUrl = profile.avatar_url || session.avatar_url;
            if (avatarUrl) {
                document.getElementById('avatar-initials').style.display = 'none';
                document.getElementById('avatar-img').style.display = 'block';
                document.getElementById('avatar-img').src = avatarUrl;
            } else {
                document.getElementById('avatar-initials').innerText = name ? name.charAt(0).toUpperCase() : 'D';
            }
        }

        async function saveDriverProfile() {
            const btn = document.getElementById('save-btn');
            btn.innerHTML = '<div class="spinner"></div> Saving...';
            btn.disabled = true;

            const name = document.getElementById('profile-name').value;
            const phone = document.getElementById('profile-phone').value;
            const car = document.getElementById('profile-car').value;
            const plate = document.getElementById('profile-plate').value;

            try {
                const session = await requireUserSession();

                const { error } = await supabaseClient.from('profiles').update({
                    name: name,
                    phone: phone,
                    car: car,
                    plate: plate
                }).eq('id', session.id);

                if (error) throw error;

                // Update local storage
                const currentProfile = getCachedProfile();
                currentProfile.name = name;
                currentProfile.phone = phone;
                currentProfile.car = car;
                currentProfile.plate = plate;
                localStorage.setItem('sharcaProfile', JSON.stringify(currentProfile));

                const currentSession = getStoredSession();
                currentSession.name = name;
                currentSession.phone = phone;
                currentSession.car = car;
                currentSession.plate = plate;
                localStorage.setItem('sharcaSession', JSON.stringify(currentSession));

                document.getElementById('display-name').innerText = name;

                showToast();
            } catch (err) {
                alert('Error saving profile: ' + err.message);
            } finally {
                btn.innerHTML = 'Save Changes';
                btn.disabled = false;
            }
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const avatarContainer = document.querySelector('.avatar-container');
            avatarContainer.style.opacity = '0.5';

            try {
                const base64Img = await compressAndUploadAvatar(file);
                
                document.getElementById('avatar-initials').style.display = 'none';
                document.getElementById('avatar-img').style.display = 'block';
                document.getElementById('avatar-img').src = base64Img;
                
                showToast('Photo uploaded successfully!');
            } catch (err) {
                alert('Failed to upload photo: ' + err.message);
            } finally {
                avatarContainer.style.opacity = '1';
            }
        }

        function showToast(msg = 'Driver Details Updated!') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function handleLogout() {
            if(confirm('Are you sure you want to log out?')) {
                await supabaseClient.auth.signOut();
                localStorage.removeItem('sharcaSession');
                localStorage.removeItem('sharcaProfile');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
